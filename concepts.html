<!DOCTYPE html>
<html lang="en">
<head>
    <title>Concepts - Sumanth Reddy Data Scientist Portfolio</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <style>
        /* Additional styles */
        body {
            font-family: 'Aptos', sans-serif; /* Apply Aptos font to the body */
        }
        #main {
            display: flex;
        }
        #sidebar {
            width: 20%;
            background: #f9f9f9;
            padding: 10px;
        }
        #content {
            width: 80%;
            padding: 10px;
            overflow: auto; /* Allow content to scroll */
        }
        .dropdown {
            cursor: pointer;
            user-select: none;
            font-weight: bold; /* Make text bold */
        }
        .dropdown-content {
            display: none;
            background-color: #f9f9f9;
            padding: 10px;
        }
        .show .dropdown-content {
            display: block;
        }
        iframe {
            width: 100%;
            border: none;
        }
        .index li {
            list-style-type: decimal;
            margin-left: 20px;
        }
    </style>
    <script>
        // JavaScript for handling dropdown
        function toggleDropdown(dropdownId) {
            var dropdown = document.getElementById(dropdownId);
            if (dropdown.style.display === 'block') {
                dropdown.style.display = 'none';
            } else {
                dropdown.style.display = 'block';
            }
        }
        // Function to open pages and resize iframe according to its content
        function openPage(pageUrl) {
            var iframe = document.getElementById('content-frame');
            iframe.onload = function() {
                iframe.style.height = iframe.contentDocument.body.scrollHeight + 'px';
            };
            iframe.src = pageUrl;
        }
    </script>
</head>
<body class="is-preload">
    <!-- Wrapper -->
    <div id="wrapper" class="fade-in">
        <!-- Header -->
        <header id="header">
            <a href="index.html" class="logo">Sumanth Katkoori Data Scientist</a>
        </header>

        <!-- Nav -->
        <nav id="nav">
            <ul class="links">
                <li class="active"><a href="index.html">Projects</a></li>
                <li><a href="concepts.html">Concepts</a></li> <!-- Add this line for the Concepts section -->
            </ul>
            <ul class="icons">
                <li><a href="https://www.linkedin.com/in/sumanthreddy2619/" target="_blank" class="icon brands fa-linkedin"><span class="label">LinkedIn</span></a></li>
                <li><a href="https://github.com/skatkoor" target="_blank" class="icon brands fa-github"><span class="label">GitHub</span></a></li>
            </ul>
        </nav>

        <!-- Main -->
        <div id="main">
            <!-- Sidebar -->
            <div id="sidebar">
                <!-- Dropdown for Azure Synapse -->
                <div class="dropdown" onclick="toggleDropdown('dropdown1')">
                    <span>Azure Synapse</span>
                    <div id="dropdown1" class="dropdown-content">
                        <ul class="index">
                            <li><a href="#" onclick="openPage('Pipelines.html');">Pipelines</a></li>
                            <li><a href="#" onclick="openPage('Control_Table.html');">Control Table</a></li>
                            <li><a href="#" onclick="openPage('Linked_Services.html');">Linked Services</a></li>
                            <li><a href="#" onclick="openPage('serverlesssparkpool.html');">Serverless Spark Pool</a></li>
                            <li><a href="#" onclick="openPage('Delta_Lake.html');">Delta Lake</a></li>
                        </ul>
                    </div>
                </div>
                <!-- Dropdown for AI -->
                <div class="dropdown" onclick="toggleDropdown('dropdown2')">
                    <span>AI</span>
                    <div id="dropdown2" class="dropdown-content">
                        <ul class="index">
                            <li><a href="#" onclick="openPage('ai_concepts.html');">AI Concepts</a></li> <!-- Link to the content page for AI concepts -->
                            <!-- Add more AI-related content here if needed -->
                        </ul>
                    </div>
                </div>
                <!-- Additional dropdowns... -->
            </div>

            <!-- Content -->
            <div id="content">
                <iframe id="content-frame" name="content-frame" src=""></iframe>
            </div>
        </div>
    </div>
</body>
</html>
