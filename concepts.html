<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concepts - Sumanth Reddy</title>
    <!-- Include main.css -->
    <link rel="stylesheet" href="assets/css/main.css" />
    <!-- Include any other CSS files if needed -->
    <style>
        /* Add your custom CSS styles here */
        body {
            background-color: #fff; /* Set background color to white */
            color: #333; /* Set text color to dark gray */
        }
        .fade-in {
            background-color: #f9f9f9; /* Set background color of the wrapper to a light gray */
            padding: 20px; /* Add some padding */
        }
        .concept-list {
            float: left;
            width: 20%;
            margin-right: 20px;
        }
        .concept-content {
            overflow: hidden;
        }
        .concept-dropdown {
            display: none;
        }
    </style>
</head>
<body class="is-preload">

    <!-- Wrapper -->
    <div id="wrapper" class="fade-in">

        <!-- Intro, Header, Nav sections -->

        <!-- Main -->
        <div id="main">
            <!-- Your content goes here -->
            <h1>Concepts</h1>
            <!-- Filter by title option -->
            <input type="text" id="concept-filter" placeholder="Filter by title">
            <!-- List of Concepts -->
            <div class="concept-list">
                <ul>
                    <li><a href="#concept-1">Azure Synapse</a></li>
                    <li><a href="#concept-2">Deep Learning</a></li>
                    <li><a href="#concept-3">Delta Lake</a></li>
                    <li><a href="#concept-4">Machine Learning</a></li>
                    <li><a href="#concept-5">Serverless SQL Pools</a></li>
                </ul>
            </div>
            <div class="concept-content">
                <!-- Concept 1: Azure Synapse -->
                <div id="concept-1" class="concept-dropdown">
                    <!-- HTML content for Azure Synapse concept -->
                </div>
                <!-- Concept 2: Deep Learning -->
                <div id="concept-2" class="concept-dropdown">
                    <!-- HTML content for Deep Learning concept -->
                </div>
                <!-- Concept 3: Delta Lake -->
                <div id="concept-3" class="concept-dropdown">
                    <!-- HTML content for Delta Lake concept -->
                </div>
                <!-- Concept 4: Machine Learning -->
                <div id="concept-4" class="concept-dropdown">
                    <!-- HTML content for Machine Learning concept -->
                </div>
                <!-- Concept 5: Serverless SQL Pools -->
                <div id="concept-5" class="concept-dropdown">
                    <!-- HTML content for Serverless SQL Pools concept -->
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <!-- Your footer content goes here -->
        </footer>

    </div>

    <!-- Scripts -->
    <script src="assets/js/jquery.min.js"></script>
    <script src="assets/js/jquery.scrollex.min.js"></script>
    <script src="assets/js/jquery.scrolly.min.js"></script>
    <script src="assets/js/browser.min.js"></script>
    <script src="assets/js/breakpoints.min.js"></script>
    <script src="assets/js/util.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        // JavaScript code for filtering concepts by title
        $(document).ready(function(){
            $("#concept-filter").on("keyup", function() {
                var value = $(this).val().toLowerCase();
                $(".concept-list ul li").filter(function() {
                    $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1)
                });
            });
        });
    </script>
</body>
</html>
