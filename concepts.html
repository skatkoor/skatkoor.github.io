<!DOCTYPE html>
<html lang="en">
<head>
    <title>Concepts - Sumanth Reddy Data Scientist Portfolio</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <!-- Additional styles may be required -->
    <style>
        #main {
            display: flex;
        }
        #sidebar {
            width: 20%;
            background: #f9f9f9; /* Sample background color */
            padding: 10px;
        }
        #content {
            width: 80%;
            padding: 10px;
        }
        /* Style for dropdown */
        .dropdown {
            cursor: pointer;
            user-select: none;
            font-weight: bold;
            font-family: 'Aptos', sans-serif;
        }
        .dropdown-content {
            display: none;
            background-color: #f9f9f9;
            padding: 10px;
        }
        .show .dropdown-content {
            display: block;
        }
        iframe {
            width: 100%;
            border: none;
        }
        .index {
            margin-left: 20px;
        }
        .index li {
            list-style-type: decimal;
            margin-left: 20px;
        }
    </style>
    <!-- JavaScript for handling dropdown and iframe -->
    <script>
        function toggleDropdown(dropdownId) {
            var dropdown = document.getElementById(dropdownId);
            if (dropdown.classList.contains('show')) {
                dropdown.classList.remove('show');
            } else {
                var dropdowns = document.getElementsByClassName('dropdown-content');
                for (var i = 0; i < dropdowns.length; i++) {
                    dropdowns[i].classList.remove('show');
                }
                dropdown.classList.add('show');
            }
        }
        function openPage(pageUrl) {
            var iframe = document.getElementById('content-frame');
            iframe.src = pageUrl;
            iframe.onload = function() {
                iframe.style.height = iframe.contentWindow.document.body.scrollHeight + 'px';
            }
        }
    </script>
</head>
<body class="is-preload">

            <li><a href="https://github.com/skatkoor" target="_blank" class="icon brands fa-github"><span class="label">GitHub</span></a></li>
        </ul>
    </nav>

                <div id="deep_learning_dropdown" class="dropdown-content">
                    <!-- Add links to other sub-sections -->

        <!-- Content -->
