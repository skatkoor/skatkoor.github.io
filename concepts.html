<!DOCTYPE html>
<html lang="en">
<head>
    <title>Concepts - Sumanth Reddy Data Scientist Portfolio</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <style>
        /* Additional styles */
        body {
            font-family: 'Aptos', sans-serif; /* Apply Aptos font to the body */
        }
        #main {
            display: flex;
        }
        #sidebar {
            width: 20%;
            background: #f9f9f9;
            padding: 10px;
        }
        #content {
            width: 80%;
            padding: 10px;
            overflow: hidden; /* Disable content overflow */
        }
        .dropdown {
            cursor: pointer;
            user-select: none;
            font-weight: bold; /* Make text bold */
        }
        .dropdown-content {
            display: none;
            background-color: #f9f9f9;
            padding: 10px;
        }
        .show .dropdown-content {
            display: block;
        }
        iframe {
            width: 100%;
            border: none;
        }
        .index li {
            list-style-type: decimal;
            margin-left: 20px;
        }
    </style>
    <script>
        // JavaScript for handling dropdown and iframe resizing
        function toggleDropdown(dropdownId) {
            var dropdown = document.getElementById(dropdownId);
            dropdown.classList.toggle('show');
        }
        // Function to open pages and resize iframe according to its content
        function openPage(pageUrl) {
            var iframe = document.getElementById('content-frame');
            iframe.onload = function() {
                this.style.height = this.contentWindow.document.documentElement.scrollHeight + 'px';
            };
            iframe.src = pageUrl;
        }
        // Function to resize the iframe when the window is resized
        window.onresize = function() {
            var iframe = document.getElementById('content-frame');
            if (iframe.src) {
                iframe.style.height = iframe.contentWindow.document.documentElement.scrollHeight + 'px';
            }
        };
    </script>
</head>
<body class="is-preload">
    <!-- Wrapper -->
    <div id="wrapper" class="fade-in">
        <!-- Header, Nav, and other elements... -->

        <!-- Main -->
        <div id="main">
            <!-- Sidebar -->
            <div id="sidebar">
                <!-- Dropdown for Azure Synapse -->
                <div class="dropdown">
                    <span onclick="toggleDropdown('dropdown1')">Azure Synapse</span>
                    <div id="dropdown1" class="dropdown-content">
                        <ul class="index">
                            <li><a href="#" onclick="openPage('Control_Table.html');">Control Table</a></li>
                            <li><a href="#" onclick="openPage('Delta_Lake.html');">Delta Lake</a></li>
                        </ul>
                    </div>
                </div>
                <!-- Additional dropdowns... -->
            </div>

            <!-- Content -->
            <div id="content">
                <iframe id="content-frame" name="content-frame" src=""></iframe>
            </div>
        </div>

        <!-- Footer and Scripts... -->
    </div>
</body>
</html>
